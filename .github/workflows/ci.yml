name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  XCODEGEN_VERSION: "2.45.4"

jobs:
  swift-package-tests:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Verify Swift toolchain
        run: swift --version
      - name: Test Swift package
        run: swift test

  xcode-gates:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Install and verify XcodeGen
        run: |
          brew install xcodegen
          test "$(xcodegen --version | awk '{print $NF}')" = "$XCODEGEN_VERSION"
      - name: Verify generated project is current
        run: |
          bash Scripts/generate-project.sh
          git diff --exit-code -- CodexUsageMonitor.xcodeproj Config
      - name: Test Xcode project
        run: |
          xcodebuild \
            -project CodexUsageMonitor.xcodeproj \
            -scheme CodexUsageMonitorTests \
            -configuration Debug \
            -derivedDataPath .build/ci-xcode-tests \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            test
      - name: Compile and package without signing
        run: CODE_SIGNING_ALLOWED=NO bash Scripts/build-app.sh
      - name: Verify packaged bundle
        run: bash Scripts/verify-bundle.sh "dist/Codex Usage Monitor.app"
      - name: Verify distribution archive
        run: unzip -t dist/Codex-Usage-Monitor-macOS.zip
